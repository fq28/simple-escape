<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soul-Link Team Roller</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a14;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Press Start 2P', monospace;
    padding: clamp(8px, 2vh, 18px) 14px 58px;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  @keyframes spin      { to { transform: rotate(360deg); } }
  @keyframes fadeSlide { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  @keyframes ruleReveal {
    0%   { opacity:0; transform: scale(.92) translateY(6px); letter-spacing: 4px; }
    60%  { opacity:1; transform: scale(1.02); letter-spacing: 1.5px; }
    100% { opacity:1; transform: scale(1);    letter-spacing: 1.5px; }
  }
  @keyframes flash {
    0%,100% { opacity:1; }
    50%     { opacity:.3; }
  }

  /* ── Slot reveal ── */
  @keyframes slamIn {
    0%   { transform: scale(1.35) translateY(-14px); opacity: 0; }
    55%  { transform: scale(0.93) translateY(3px);   opacity: 1; }
    78%  { transform: scale(1.05); }
    100% { transform: scale(1) translateY(0); }
  }
  .num-card.slam { animation: slamIn .32s cubic-bezier(.36,.07,.19,.97) both; }

  /* ── Shiny ── */
  @keyframes shinyGlow {
    0%,100% { box-shadow: 0 5px 0 #000, 0 0 8px #fbbf2444; border-color: #fbbf2466; }
    50%     { box-shadow: 0 5px 0 #000, 0 0 30px #fbbf24cc, 0 0 60px #f59e0b44; border-color: #fbbf24; }
  }
  @keyframes shinyNum {
    0%,100% { color: #e8e8e8; text-shadow: none; }
    50%     { color: #fef3c7; text-shadow: 0 0 16px #fbbf24cc; }
  }
  @keyframes shinyBadge {
    from { opacity: 0; transform: translateX(-50%) translateY(4px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .num-card.shiny {
    background: #110e02;
    animation: shinyGlow 2s ease-in-out infinite;
  }
  .num-card.shiny .card-num { animation: shinyNum 2s ease-in-out infinite; }
  .num-card.shiny::after {
    content: 'SHINY';
    position: absolute;
    bottom: 6px; left: 50%;
    transform: translateX(-50%);
    font-size: 5px; letter-spacing: 1.5px; color: #fbbf24;
    white-space: nowrap;  
    animation: shinyBadge .5s ease .15s both;
  }

  /* ── Header ── */
  #header { text-align: center; margin-bottom: 10px; }
  .soul-link-row { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:5px; }
  .soul-link-label { color:#ef4444; font-size:13px; letter-spacing:3px; }
  .title-main { color:#f0f0f0; font-size:16px; letter-spacing:3px; margin-bottom:5px; }

  /* ── Team counter (lives in pool row) ── */
  #team-counter {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 9px; color: #8888aa; letter-spacing: 1px;
  }
  #team-count-input {
    background: none; border: none; border-bottom: 1px solid transparent;
    color: #8888aa; font-family: 'Press Start 2P', monospace; font-size: 9px;
    width: 32px; text-align: center; outline: none; padding: 0 2px;
    -moz-appearance: textfield; transition: color .2s, border-color .2s;
    user-select: none; -webkit-user-select: none; cursor: default;
  }
  #team-count-input:focus {
    color: #e0e0e0; border-bottom-color: #ef4444;
    user-select: text; -webkit-user-select: text; cursor: text;
  }

  /* divider pip between counter and pool */
  .pool-sep { color: #444466; font-size: 9px; }

  @keyframes counterBump {
    0%   { transform: scale(1);    color: #444466; }
    30%  { transform: scale(1.45); color: #ef4444; }
    100% { transform: scale(1);    color: #444466; }
  }
  #team-count-input.bumped { animation: counterBump .4s ease both; }
  .pokeball { display:block; }
  .pokeball.spinning { animation: spin .35s linear infinite; }

  /* ── Pool row ── */
  #pool-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; justify-content:center; }
  #pool-row label { color:#8888aa; font-size:9px; letter-spacing:1px; }
  #pool-input {
    background:#12122a; border:1px solid #252545; border-radius:4px;
    color:#e0e0e0; font-family:'Press Start 2P',monospace; font-size:12px;
    padding:9px 12px; width:90px; text-align:center; outline:none;
    transition:border-color .2s; -moz-appearance:textfield;
  }
  #pool-input:focus { border-color:#ef4444; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }

  /* ── Roll button wrapper ── */
  #roll-wrap {
    width: 100%; max-width: min(calc(100vw - 28px), 440px);
    margin-bottom: 12px; display: flex; flex-direction: column; gap: 0;
  }

  /* ── Roll button ── */
  #roll-btn {
    background: linear-gradient(135deg,#ef4444,#b91c1c);
    color:#fff; font-family:'Press Start 2P',monospace; font-size:11px;
    padding:11px 36px; border-radius:6px 6px 0 0; border:none; cursor:pointer;
    letter-spacing:2px;
    box-shadow: 0 0 28px rgba(239,68,68,.4);
    transition:transform .1s, background .2s, box-shadow .2s;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
    width: 100%; position: relative; overflow: hidden;
    border-bottom: 2px solid #7f1d1d;
  }
  #roll-btn.rolling { background:#1a1a2e; box-shadow:none; opacity:.6; cursor:not-allowed; border-bottom-color:#111; }
  #roll-btn.charging { cursor: pointer; }

  /* ── Charge bar ── */
  #charge-bar-wrap {
    width: 100%; height: 6px; background: #0e0e1e;
    border-radius: 0 0 6px 6px;
    border: 1px solid #1e1e38; border-top: none;
    overflow: hidden;
    box-shadow: 0 4px 0 #000;
  }
  #charge-bar {
    height: 100%; width: 0%; background: #ef4444;
    border-radius: 0 0 6px 6px;
    transition: width linear;
    box-shadow: 0 0 10px #ef4444cc;
  }
  #charge-bar.full { background: #fff; box-shadow: 0 0 18px #ffffffcc; }

  @keyframes chargePulse {
    0%,100% { box-shadow: 0 0 28px rgba(239,68,68,.4); }
    50%      { box-shadow: 0 0 55px rgba(239,68,68,.85), 0 0 90px rgba(239,68,68,.3); }
  }
  #roll-btn.charging { animation: chargePulse .5s ease-in-out infinite; }

  /* ── Number grid ── */
  #num-grid {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:8px; width:100%; max-width:min(calc(100vw - 28px), 440px); margin-bottom:10px;
  }
  .num-card {
    background:#10101e; border:2px solid #1e1e38; border-radius:10px;
    padding:14px 8px 18px; text-align:center; box-shadow:0 5px 0 #000;
    position:relative; cursor:pointer;
    transition:transform .15s, border-color .3s, background .3s, box-shadow .3s;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
    min-height: 90px;
  }
  .num-card:active { transform:scale(.96); }
  .num-card.rerolling { animation: flash .18s linear 3; }
  .card-slot { font-size:9px; margin-bottom:7px; letter-spacing:1px; }
  .card-num  { font-size:26px; line-height:1; color:#e8e8e8; transition:color .1s, font-size .1s, text-shadow .1s; }
  .card-num.empty   { font-size:18px; color:#222244; }
  .card-num.rolling { font-size:16px; }

  /* ── Screen overlay (for mythical effects) ── */
  #screen-overlay {
    position: fixed; inset: 0; pointer-events: none;
    z-index: 200; opacity: 0; transition: opacity .1s;
  }

  /* ── Rule box ── */
  #rule-box {
    width:100%; max-width:min(calc(100vw - 28px), 440px);
    border-radius:10px; border:1px solid #1a1a34;
    padding:10px 14px; margin-bottom:8px;
    background:#0c0c1c;
    transition: border-color .3s, opacity .4s, transform .4s;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    min-height: 58px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  #rule-box.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* ═══════════════════════════════════════════════
     CURSE animations (slam from above, warm colors)
  ═══════════════════════════════════════════════ */
  @keyframes curseSlam {
    0%   { opacity:0; transform: scale(1.15) translateY(-20px); }
    55%  { opacity:1; transform: scale(0.97) translateY(4px); }
    78%  { transform: scale(1.03); }
    100% { opacity:1; transform: scale(1) translateY(0); }
  }
  @keyframes buffRise {
    0%   { opacity:0; transform: scale(.9) translateY(18px); }
    60%  { opacity:1; transform: scale(1.02) translateY(-3px); }
    100% { opacity:1; transform: scale(1) translateY(0); }
  }

  /* Mythical Curse: screen goes dark, red crack, then text */
  @keyframes mythicCurseDarken {
    0%   { background: #000; opacity: 0; }
    15%  { opacity: .85; }
    70%  { opacity: .85; }
    100% { opacity: 0; }
  }
  @keyframes mythicCursePulse {
    0%,100% { box-shadow: 0 0 0 #7f0000; }
    20% { box-shadow: 0 0 80px #dc262699, 0 0 160px #7f000066; }
    50% { box-shadow: 0 0 40px #dc262677; }
  }
  @keyframes mythicCurseText {
    0%   { opacity:0; transform: scale(1.3) translateY(-12px); letter-spacing:8px; }
    40%  { opacity:1; transform: scale(.98) translateY(2px); letter-spacing:2px; }
    100% { opacity:1; transform: scale(1) translateY(0); letter-spacing:1.5px; }
  }

  /* Mythical Buff: white flash then ice-blue glow */
  @keyframes mythicBuffFlash {
    0%   { background: #fff; opacity: 0; }
    8%   { opacity: 1; }
    40%  { opacity: .6; }
    100% { opacity: 0; }
  }
  @keyframes mythicBuffGlow {
    0%,100% { box-shadow: 0 0 20px #67e8f944; }
    50% { box-shadow: 0 0 70px #67e8f9bb, 0 0 120px #0e749944; }
  }
  @keyframes mythicBuffText {
    0%   { opacity:0; transform: scale(.85) translateY(16px); filter: blur(4px); }
    50%  { opacity:1; transform: scale(1.01) translateY(-2px); filter: blur(0); }
    100% { opacity:1; transform: scale(1) translateY(0); filter: blur(0); }
  }

  /* Pulse animations per tier × type */
  @keyframes pulseMythicCurse    { 0%,100%{box-shadow:0 0 20px #7f000033,inset 0 0 20px #7f000011} 50%{box-shadow:0 0 60px #dc2626aa,0 0 100px #7f000055,inset 0 0 30px #dc262622} }
  @keyframes pulseMythicBuff     { 0%,100%{box-shadow:0 0 20px #67e8f944} 50%{box-shadow:0 0 70px #67e8f9bb,0 0 120px #0e749944} }
  @keyframes pulseLegendaryCurse { 0%{box-shadow:0 0 0 #b4530000} 30%{box-shadow:0 0 50px #f97316cc,0 0 90px #b4530066} 70%{box-shadow:0 0 30px #f9731688} 100%{box-shadow:0 0 10px #f9731633} }
  @keyframes pulseLegendaryBuff  { 0%{box-shadow:0 0 0 #06966600} 30%{box-shadow:0 0 50px #34d399cc,0 0 90px #06966666} 70%{box-shadow:0 0 30px #34d39988} 100%{box-shadow:0 0 10px #34d39933} }
  @keyframes pulseUltraCurse     { 0%,100%{box-shadow:0 0 12px #7c3aed33} 50%{box-shadow:0 0 36px #7c3aed99} }
  @keyframes pulseUltraBuff      { 0%,100%{box-shadow:0 0 12px #0891b233} 50%{box-shadow:0 0 36px #0891b299} }
  @keyframes pulseRareCurse      { 0%,100%{box-shadow:0 0 10px #ef444420} 50%{box-shadow:0 0 28px #ef444466} }
  @keyframes pulseRareBuff       { 0%,100%{box-shadow:0 0 10px #16a34a20} 50%{box-shadow:0 0 28px #16a34a66} }
  @keyframes pulseUncommonCurse  { 0%,100%{box-shadow:0 0 8px #dc262611} 50%{box-shadow:0 0 18px #dc262644} }
  @keyframes pulseUncommonBuff   { 0%,100%{box-shadow:0 0 8px #0d948011} 50%{box-shadow:0 0 18px #0d948044} }

  /* ── Tier+type box styles ── */
  /* MYTHICAL CURSE */
  #rule-box.tier-mythical.type-curse {
    background: #080004; border-color: #7f0000;
    animation: curseSlam .45s cubic-bezier(.36,.07,.19,.97) both, pulseMythicCurse 1.8s ease-in-out .5s infinite;
  }
  #rule-title.tier-mythical.type-curse { color: #dc2626; letter-spacing:5px; }
  #rule-text.tier-mythical.type-curse  { color: #fca5a5; text-shadow: 0 0 10px #7f000099; animation: mythicCurseText .9s ease .6s both; }

  /* MYTHICAL BUFF */
  #rule-box.tier-mythical.type-buff {
    background: #000d14; border-color: #67e8f9;
    animation: buffRise .5s cubic-bezier(.22,.61,.36,1) both, pulseMythicBuff 2s ease-in-out .5s infinite;
  }
  #rule-title.tier-mythical.type-buff { color: #67e8f9; letter-spacing:5px; }
  #rule-text.tier-mythical.type-buff  { color: #cffafe; text-shadow: 0 0 14px #67e8f966; animation: mythicBuffText 1s ease .5s both; }

  /* LEGENDARY CURSE */
  #rule-box.tier-legendary.type-curse {
    background: #0d0500; border-color: #f97316;
    animation: curseSlam .4s cubic-bezier(.36,.07,.19,.97) both, pulseLegendaryCurse 1.6s ease-in-out .3s 4;
  }
  #rule-title.tier-legendary.type-curse { color: #f97316; letter-spacing:4px; }
  #rule-text.tier-legendary.type-curse  { color: #fed7aa; text-shadow: 0 0 10px #f9731655; animation: ruleReveal .8s ease .3s both; }

  /* LEGENDARY BUFF */
  #rule-box.tier-legendary.type-buff {
    background: #001209; border-color: #34d399;
    animation: buffRise .45s cubic-bezier(.22,.61,.36,1) both, pulseLegendaryBuff 1.6s ease-in-out .3s 4;
  }
  #rule-title.tier-legendary.type-buff { color: #34d399; letter-spacing:4px; }
  #rule-text.tier-legendary.type-buff  { color: #d1fae5; text-shadow: 0 0 10px #34d39955; animation: ruleReveal .8s ease .3s both; }

  /* ULTRA RARE CURSE */
  #rule-box.tier-ultra.type-curse {
    background: #0a0514; border-color: #7c3aed88;
    animation: curseSlam .38s cubic-bezier(.36,.07,.19,.97) both, pulseUltraCurse 2s ease-in-out .4s 3;
  }
  #rule-title.tier-ultra.type-curse { color: #a78bfa; }
  #rule-text.tier-ultra.type-curse  { color: #ede9fe; animation: ruleReveal .7s ease .25s both; }

  /* ULTRA RARE BUFF */
  #rule-box.tier-ultra.type-buff {
    background: #00080f; border-color: #0891b288;
    animation: buffRise .42s cubic-bezier(.22,.61,.36,1) both, pulseUltraBuff 2s ease-in-out .4s 3;
  }
  #rule-title.tier-ultra.type-buff { color: #22d3ee; }
  #rule-text.tier-ultra.type-buff  { color: #cffafe; animation: ruleReveal .7s ease .25s both; }

  /* RARE CURSE */
  #rule-box.tier-rare.type-curse {
    background: #0f0606; border-color: #ef444455;
    animation: curseSlam .35s cubic-bezier(.36,.07,.19,.97) both, pulseRareCurse 2s ease-in-out .4s 3;
  }
  #rule-title.tier-rare.type-curse { color: #f87171; }
  #rule-text.tier-rare.type-curse  { color: #fecaca; animation: ruleReveal .6s ease .2s both; }

  /* RARE BUFF */
  #rule-box.tier-rare.type-buff {
    background: #020f05; border-color: #16a34a55;
    animation: buffRise .38s cubic-bezier(.22,.61,.36,1) both, pulseRareBuff 2s ease-in-out .4s 3;
  }
  #rule-title.tier-rare.type-buff { color: #4ade80; }
  #rule-text.tier-rare.type-buff  { color: #dcfce7; animation: ruleReveal .6s ease .2s both; }

  /* UNCOMMON CURSE */
  #rule-box.tier-uncommon.type-curse {
    border-color: #dc262644;
    animation: curseSlam .32s cubic-bezier(.36,.07,.19,.97) both, pulseUncommonCurse 2.2s ease-in-out .4s 2;
  }
  #rule-title.tier-uncommon.type-curse { color: #f87171; }
  #rule-text.tier-uncommon.type-curse  { color: #fecaca; animation: ruleReveal .55s ease .15s both; }

  /* UNCOMMON BUFF */
  #rule-box.tier-uncommon.type-buff {
    border-color: #0d948044;
    animation: buffRise .35s cubic-bezier(.22,.61,.36,1) both, pulseUncommonBuff 2.2s ease-in-out .4s 2;
  }
  #rule-title.tier-uncommon.type-buff { color: #2dd4bf; }
  #rule-text.tier-uncommon.type-buff  { color: #ccfbf1; animation: ruleReveal .55s ease .15s both; }

  /* COMMON CURSE */
  #rule-box.tier-common.type-curse {
    border-color: #dc262633;
    animation: curseSlam .3s cubic-bezier(.36,.07,.19,.97) both;
  }
  #rule-title.tier-common.type-curse { color: #f87171; }
  #rule-text.tier-common.type-curse  { color: #fca5a5; animation: ruleReveal .5s ease .1s both; }

  /* COMMON BUFF */
  #rule-box.tier-common.type-buff {
    border-color: #16a34a33;
    animation: buffRise .32s cubic-bezier(.22,.61,.36,1) both;
  }
  #rule-title.tier-common.type-buff { color: #4ade80; }
  #rule-text.tier-common.type-buff  { color: #bbf7d0; animation: ruleReveal .5s ease .1s both; }

  /* FREQUENT CURSE */
  #rule-box.tier-frequent.type-curse {
    border-color: #dc262622;
    animation: curseSlam .28s ease both;
  }
  #rule-title.tier-frequent.type-curse { color: #ef4444; }
  #rule-text.tier-frequent.type-curse  { color: #fca5a5; animation: ruleReveal .45s ease both; }

  /* FREQUENT BUFF */
  #rule-box.tier-frequent.type-buff {
    border-color: #16a34a22;
    animation: buffRise .28s ease both;
  }
  #rule-title.tier-frequent.type-buff { color: #22c55e; }
  #rule-text.tier-frequent.type-buff  { color: #bbf7d0; animation: ruleReveal .45s ease both; }

  /* GUARANTEED — flat, no drama */
  #rule-box.tier-guaranteed.type-curse {
    border-color: #52181822;
    animation: fadeSlide .3s ease both;
  }
  #rule-title.tier-guaranteed.type-curse { color: #b45454; }
  #rule-text.tier-guaranteed.type-curse  { color: #e8e8e8; animation: fadeSlide .3s ease both; }

  #rule-box.tier-guaranteed.type-buff {
    border-color: #18522222;
    animation: fadeSlide .3s ease both;
  }
  #rule-title.tier-guaranteed.type-buff { color: #4a9e6a; }
  #rule-text.tier-guaranteed.type-buff  { color: #e8e8e8; animation: fadeSlide .3s ease both; }

  /* No-rule fallback */
  #rule-box.show:not([class*="tier-"]) {
    animation: fadeSlide .4s ease both;
  }

  #rule-title {
    font-size:8px; color:#333355; letter-spacing:2px;
    text-align:center; margin-bottom:10px;
    transition: color .3s;
  }
  #rule-text {
    font-size:9px; color:#555577; text-align:center; line-height:2;
    letter-spacing:.5px;
  }
  #rule-text.has-rule { color:#e8e8e8; }

  /* ── Tier display pill ── */
  .rule-tier-pill {
    border-radius: 20px; font-family: 'Press Start 2P', monospace; font-size: 6px;
    padding: 3px 7px; letter-spacing: 1px; flex-shrink: 0; pointer-events: none;
    border: 1px solid; white-space: nowrap;
  }
  .rule-tier-pill.tier-mythical   { color: #dc2626; border-color: #7f000066; background: #08000a; }
  .rule-tier-pill.tier-legendary  { color: #f97316; border-color: #f9731644; background: #0d0500; }
  .rule-tier-pill.tier-ultra      { color: #a78bfa; border-color: #7c3aed44; background: #0a0514; }
  .rule-tier-pill.tier-rare       { color: #f87171; border-color: #ef444433; background: #0f0606; }
  .rule-tier-pill.tier-uncommon   { color: #2dd4bf; border-color: #0d948033; background: #020c08; }
  .rule-tier-pill.tier-common     { color: #4ade80; border-color: #16a34a22; background: #020f05; }
  .rule-tier-pill.tier-frequent   { color: #888899; border-color: #44444433; background: #0a0a0a; }
  .rule-tier-pill.tier-guaranteed { color: #555566; border-color: #33333322; background: #0a0a0a; }

  /* ── Buff/Curse pill toggle ── */
  .rule-type-pill {
    border: none; border-radius: 20px; cursor: pointer;
    font-family: 'Press Start 2P', monospace; font-size: 6px;
    padding: 4px 8px; letter-spacing: 1px; flex-shrink: 0;
    transition: background .2s, color .2s, box-shadow .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .rule-type-pill.curse {
    background: #4a0808; color: #f87171;
    box-shadow: 0 0 8px #dc262633;
  }
  .rule-type-pill.curse:hover { background: #7f0d0d; box-shadow: 0 0 12px #dc262655; }
  .rule-type-pill.buff {
    background: #053a38; color: #2dd4bf;
    box-shadow: 0 0 8px #0d948033;
  }
  .rule-type-pill.buff:hover { background: #0a5a56; box-shadow: 0 0 12px #0d948055; }

  .jentry-battle-pill {
    display:inline-flex; align-items:center; gap:5px;

  .jentry-del {

  /* Slot chips row */
  .jentry-slots {

  }
  .jentry-chip {

  /* Empty state */

  /* ── Rules panel ── */
  #rules-panel {
    display:none;
    position:fixed; bottom:56px; right:14px;

  }

  #rules-list {
    margin-bottom:10px;

  }

  .rule-item {
    display: flex;

    gap: 5px;
    padding-bottom: 10px;
    margin-bottom: 10px;

  .rule-text-input {
    width: 100%;
    background:#12122a; border:1px solid #1e1e38; border-radius:4px;

  .rule-controls {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .rule-pct-input {
    width:46px; background:#12122a; border:1px solid #1e1e38; border-radius:4px;
    color:#a78bfa; font-family:'Press Start 2P',monospace; font-size:7px;
    padding:5px 4px; text-align:center; outline:none;
    transition:border-color .2s; -moz-appearance:textfield;
    user-select:text; -webkit-user-select:text;
  }
  .rule-pct-input:focus { border-color:#a78bfa; }
  input[type=number]::-webkit-inner-spin-button,

  .pct-label { font-size:7px; color:#a78bfa; flex-shrink:0; }

  }
  .rule-del:hover { color:#ef4444; }

  #add-rule-btn {
    width:100%; background:#12122a; border:1px solid #252545; border-radius:4px;
    color:#8888aa; font-family:'Press Start 2P',monospace; font-size:7px;

    transition:all .2s; margin-bottom:8px; flex-shrink:0;
  }
  #add-rule-btn:hover { border-color:#a78bfa; color:#a78bfa; }

  /* ── Panel toolbar (sort + import/export) ── */
  #panel-toolbar {
    display: flex; gap: 5px; margin-bottom: 8px; flex-shrink: 0; flex-wrap: wrap;
  }
  .toolbar-btn {
    background: #12122a; border: 1px solid #1e1e38; border-radius: 4px;
    color: #8888aa; font-family: 'Press Start 2P', monospace; font-size: 6px;
    padding: 5px 7px; cursor: pointer; letter-spacing: 1px;

  .toolbar-btn:hover { border-color: #a78bfa; color: #a78bfa; }

  #rules-total {
    font-size:7px; color:#8888aa; text-align:right; letter-spacing:1px; flex-shrink:0;
  }
  #rules-total span { color:#a78bfa; }

  /* ── Token modal ── */
  #token-modal-backdrop {
    position: fixed; inset: 0; background: #000000cc; z-index: 500;

    padding: 20px;
  }
  #token-modal-backdrop.hidden { display: none; }
  #token-modal {
    background: #0e0e1e; border: 1px solid #252545; border-radius: 12px;

    box-shadow: 0 16px 48px #00000088;
    animation: fadeSlide .25s ease;

    font-size: 9px; color: #a78bfa; letter-spacing: 2px;
    margin-bottom: 10px; text-align: center;
  }
  #token-modal p {
    font-size: 6px; color: #8888aa; line-height: 2.2; letter-spacing: .5px;
    margin-bottom: 14px; text-align: center;
  }
  #token-modal p a { color: #a78bfa; }
  #token-input {
    width: 100%; background: #12122a; border: 1px solid #252545; border-radius: 6px;
    color: #e0e0e0; font-family: 'Press Start 2P', monospace; font-size: 7px;
    padding: 9px 10px; outline: none; margin-bottom: 10px;
    letter-spacing: .5px; transition: border-color .2s;
    user-select: text; -webkit-user-select: text;
  }
  #token-input:focus { border-color: #a78bfa; }
  #token-input::placeholder { color: #444466; }
  #token-modal-actions {
    display: flex; gap: 8px; flex-direction: column;
  }
  .token-save-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .token-save-row label {
    font-size: 6px; color: #666688; letter-spacing: .5px; cursor: pointer; flex: 1;
  }
  #token-remember {
    accent-color: #a78bfa; cursor: pointer; flex-shrink: 0;
  }
  #token-confirm-btn {
    width: 100%; background: linear-gradient(135deg, #7c3aed, #4f1d96);
    color: #fff; font-family: 'Press Start 2P', monospace; font-size: 8px;
    padding: 10px; border: none; border-radius: 6px; cursor: pointer;
    letter-spacing: 1.5px; transition: opacity .15s;
  }
  #token-confirm-btn:hover { opacity: .85; }
  #token-skip-btn {
    width: 100%; background: none; border: 1px solid #252545; border-radius: 6px;
    color: #444466; font-family: 'Press Start 2P', monospace; font-size: 7px;
    padding: 8px; cursor: pointer; letter-spacing: 1px; transition: all .15s;
  }
  #token-skip-btn:hover { border-color: #444466; color: #8888aa; }

  /* ── Sync status pill ── */
  #sync-pill {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: #12122a; border: 1px solid #252545; border-radius: 20px;
    font-size: 6px; letter-spacing: 1px; padding: 5px 12px;
    z-index: 300; pointer-events: none; cursor: default;
    display: flex; align-items: center; gap: 6px;
    transition: opacity .4s, transform .4s;
    opacity: 0; transform: translateX(-50%) translateY(8px);
    white-space: nowrap;
  }
  #sync-pill.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #sync-pill.syncing { border-color: #a78bfa44; color: #a78bfa; pointer-events: auto; cursor: pointer; }
  #sync-pill.syncing:hover { border-color: #ef444466; color: #ef4444; }

  #sync-pill.error   { border-color: #ef444455; color: #ef4444; }
  #sync-dot {
    width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0;
  }
  #sync-pill.syncing #sync-dot { animation: flash .6s linear infinite; }

  /* ── Run selector in journal ── */
  #run-number-input {
    background: none; border: none; border-radius: 3px;
    color: #333355; font-family: 'Press Start 2P', monospace; font-size: 6px;
    padding: 2px 3px; width: 28px; text-align: right; outline: none;
    -moz-appearance: textfield; appearance: textfield;
    cursor: default; transition: color .2s, background .2s;
    user-select: none; -webkit-user-select: none;
  }
  #run-number-input:focus {
    color: #8888aa; background: #12122a;
    cursor: text; user-select: text; -webkit-user-select: text;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>

<div id="header">
  <div class="soul-link-row">
    <svg class="pokeball" id="pb-left"  width="26" height="26" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#1a1a2e" stroke="#3a3a5a" stroke-width="1"/><path d="M1 12 Q1 2 12 2 Q23 2 23 12Z" fill="#ef4444" opacity="0.85"/><line x1="1" y1="12" x2="23" y2="12" stroke="#3a3a5a" stroke-width="1.5"/><circle cx="12" cy="12" r="3.5" fill="#1a1a2e" stroke="#3a3a5a" stroke-width="1.5"/><circle cx="12" cy="12" r="1.5" fill="#e5e5e5"/></svg>

<div id="pool-row">

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Constants & state
// ─────────────────────────────────────────────────────────────────────────────
const COLORS       = ["#ef4444","#f97316","#eab308","#22c55e","#a78bfa","#ec4899"];
const SHINY_CHANCE = 1 / 512;

// ── Battle players — edit these names ──

// ─────────────────────────────────────────────────────────────────────────────
// Rarity tier system
// ─────────────────────────────────────────────────────────────────────────────
// pct → tier name
function getRuleTier(pct) {
  if (pct <= 1)  return 'mythical';
  if (pct <= 1)  return 'mythical';   // ≤1%
  if (pct === 2) return 'legendary';  // exactly 2%
  if (pct <= 4)  return 'ultra';      // 3–4%
  if (pct === 5) return 'rare';       // 5%
  if (pct <= 8)  return 'uncommon';   // 6–8%
  if (pct <= 10) return 'common';     // 9–10%
  if (pct <= 20) return 'frequent';   // 11–20%
  return 'guaranteed';                // 21%+
}

// re-evaluate so ≤1 and =2 boundaries work with floats
function getRuleTierFixed(pct) {
  if (pct <= 1)  return 'mythical';
  if (pct <= 2)  return 'legendary';
  if (pct <= 4)  return 'ultra';
  if (pct <= 5)  return 'rare';
  if (pct <= 8)  return 'uncommon';
  if (pct <= 10) return 'common';
  if (pct <= 20) return 'frequent';
  return 'guaranteed';
}

const TIER_NAMES = {
  mythical:   'MYTHICAL',
  legendary:  'LEGENDARY',
  ultra:      'ULTRA RARE',
  rare:       'RARE',
  uncommon:   'UNCOMMON',
  common:     'COMMON',
  frequent:   'FREQUENT',
  guaranteed: 'GUARANTEED',
};
function getTierLabel(tier, type) {
  return `${TIER_NAMES[tier]} ${(type || 'curse').toUpperCase()}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Web Audio — all sounds synthesised, no files
// ─────────────────────────────────────────────────────────────────────────────
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playNote(freq, delay, dur, vol = 0.15, type = 'sine', slide = 0) {
  const ctx = initAudio();
  if (!ctx) return;
  const t   = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gn  = ctx.createGain();
  osc.connect(gn);
  gn.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(slide || freq, t);
  if (slide) osc.frequency.exponentialRampToValueAtTime(freq, t + dur * 0.4);
  gn.gain.setValueAtTime(vol, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t);
  osc.stop(t + dur + 0.01);
}

function sfxSlotTick(slotIdx) {
  const freq = 150 + slotIdx * 45;

// ─────────────────────────────────────────────────────────────────────────────
// Storage helpers
// ─────────────────────────────────────────────────────────────────────────────
function saveData(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {
    try {
      const d = new Date(); d.setFullYear(d.getFullYear() + 5);
      document.cookie = `${key}=${encodeURIComponent(JSON.stringify(value))};expires=${d.toUTCString()};path=/`;
    } catch(e2) {}
  }
}

function loadData(key) {
  try {
    const v = localStorage.getItem(key);
    if (v) return JSON.parse(v);
  } catch(e) {}
  try {
    const match = document.cookie.split('; ').find(r => r.startsWith(key + '='));
    if (match) return JSON.parse(decodeURIComponent(match.split('=').slice(1).join('=')));
  } catch(e) {}
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// Sync indicator
// ─────────────────────────────────────────────────────────────────────────────
const syncPill  = document.getElementById('sync-pill');
const syncLabel = document.getElementById('sync-label');
let syncHideTimer = null;

syncPill.addEventListener('pointerdown', (e) => {
  if (!syncPill.classList.contains('syncing')) return;
  e.preventDefault();
  clearTimeout(syncTimer);
  sessionStorage.removeItem('soullink_gh_token');
  localStorage.removeItem('soullink_gh_token');
  syncPill.classList.remove('show');
  tokenBackdrop.classList.remove('hidden');
});

function showSync(state, msg) {
  // state: 'syncing' | 'done' | 'error'
  clearTimeout(syncHideTimer);
  syncPill.className = 'show ' + state;
  syncLabel.textContent = msg || (state === 'syncing' ? 'PREPARING TO SYNC' : state === 'done' ? 'SAVED' : 'SYNC ERROR');
  if (state !== 'syncing') {
    syncHideTimer = setTimeout(() => {
      syncPill.classList.remove('show');
    }, state === 'error' ? 4000 : 1800);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Token management
// ─────────────────────────────────────────────────────────────────────────────
function getToken() {
  return sessionStorage.getItem('soullink_gh_token') || localStorage.getItem('soullink_gh_token') || null;
}

function setToken(token, remember) {
  sessionStorage.setItem('soullink_gh_token', token);
  if (remember) localStorage.setItem('soullink_gh_token', token);
  else          localStorage.removeItem('soullink_gh_token');
}

// ─────────────────────────────────────────────────────────────────────────────
// Gist API
// ─────────────────────────────────────────────────────────────────────────────
async function gistFetch(payload = null) {
  const token = getToken();
  if (!token) return null;
  const opts = {
    method: payload ? 'PATCH' : 'GET',
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' },
  };
  if (payload) opts.body = JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(payload, null, 2) } } });
  const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, opts);
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  if (payload) return null;
  const data = await res.json();
  const raw = data.files?.[GIST_FILENAME]?.content;
  return raw ? JSON.parse(raw) : {};
}

// Debounced push
let syncTimer = null;
function schedulePush() {
  if (!getToken()) return;
  clearTimeout(syncTimer);
  showSync('syncing');
  syncTimer = setTimeout(pushToGist, 1700);
}

async function pushToGist() {
  const token = getToken();
  if (!token) { syncPill.classList.remove('show'); return; }
  try {
    const payload = buildGistPayload();
    await gistFetch(payload);
    showSync('done');
  } catch(e) {
    showSync('error', 'SYNC FAILED');
    console.error('Gist push failed:', e);
  }
}

function buildGistPayload() {
  // Merge all runs from local cache, then overwrite current run
  const cached = loadData('soullink_gist_cache') || {};
  cached.rules = rules;
  const runKey = `run_${currentRun}`;
  cached[runKey] = {
    journal: journalEntries,
    teamCount: teamCount,
  };
  // Store back to local cache
  saveData('soullink_gist_cache', cached);
  return cached;
}

async function pullFromGist() {
  const token = getToken();
  if (!token) return;
  showSync('syncing', 'LOADING');
  try {
    const remote = await gistFetch();
    if (!remote) { showSync('done', 'OFFLINE'); return; }

    // Save full remote as local cache
    saveData('soullink_gist_cache', remote);

    // Apply rules
    if (Array.isArray(remote.rules) && remote.rules.length) {
      rules = normalizeRules(remote.rules);
      saveData('soullink_rules', rules);
      if (panelOpen) renderRulesPanel();
    }

    // Apply current run data
    applyRunData(remote, currentRun);
    showSync('done', 'LOADED');
  } catch(e) {
    showSync('error', 'LOAD FAILED');
    console.error('Gist pull failed:', e);
  }
}

function applyRunData(remote, run) {
  const runKey = `run_${run}`;
  const runData = remote[runKey];
  if (runData) {
    if (Array.isArray(runData.journal)) {
      journalEntries = runData.journal;
      saveData('soullink_journal', journalEntries);
    }
    if (typeof runData.teamCount === 'number') {
      teamCount = runData.teamCount;
      teamCountInput.value = teamCount;
      saveData('soullink_team_count', teamCount);
    }
  } else {
    // No data for this run yet — start fresh
    journalEntries = [];
    saveData('soullink_journal', []);
  }
  updateJournalBadge();
  if (journalOpen) renderJournalEntries();
}

// ─────────────────────────────────────────────────────────────────────────────
// Rules state
// ─────────────────────────────────────────────────────────────────────────────
function normalizeRules(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(r => ({
    text: String(r.text || ''),
    pct:  parseFloat(r.pct) || 0,
    type: r.type === 'buff' ? 'buff' : 'curse',   // default curse
  }));
}

let rules = normalizeRules(loadData('soullink_rules'));

function saveRules() { saveData('soullink_rules', rules); schedulePush(); }

function rollRule() {
  if (!rules.length) return null;
  const total = rules.reduce((s, r) => s + (parseFloat(r.pct) || 0), 0);
  if (total <= 0) return null;
  const rand = Math.random() * 100;
  let acc = 0;
  for (const r of rules) {
    acc += parseFloat(r.pct) || 0;
    if (rand < acc) return { text: r.text || '(unnamed rule)', pct: parseFloat(r.pct) || 0, type: r.type || 'curse' };
  }
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function getMax() {
  const v = parseInt(document.getElementById('pool-input').value, 10);
  return isNaN(v) ? 30 : Math.max(6, Math.min(300, v));
}

function randExcluding(max, exclude) {
  const pool = [];
  for (let i = 1; i <= max; i++) {
    if (!exclude.includes(i)) pool.push(i);
  }
  if (!pool.length) return Math.floor(Math.random() * max) + 1;
  return pool[Math.floor(Math.random() * pool.length)];
}

function genTeam(max) {
  const s = new Set();
  while (s.size < 6) s.add(Math.floor(Math.random() * max) + 1);
  return [...s];
}

function formatPct(v) {
  const r = Math.round(v * 10) / 10;
  return r % 1 === 0 ? String(r) : r.toFixed(1);
}

// Build DOM
// ─────────────────────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('num-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const card = document.createElement('div');
    card.className = 'num-card';
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="card-slot" id="slot-label-${i}" style="color:${COLORS[i]}">SLOT ${i+1}</div>
      <div class="card-num empty" id="card-num-${i}">—</div>`;

    card.addEventListener('pointerdown', (e) => {
      if (rolling) return;
      if (e.button !== undefined && e.button !== 0) return;
      if (team[i] === null) return;
      rerollSlot(i);
    });

    grid.appendChild(card);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Render (during spinner)
// ─────────────────────────────────────────────────────────────────────────────
function renderCards(nums, isRolling) {
  for (let i = 0; i < 6; i++) {
    const numEl = document.getElementById(`card-num-${i}`);
    if (nums[i] === null) {
      numEl.textContent = '—';
      numEl.className   = 'card-num empty';
    } else {
      numEl.textContent      = nums[i];
      numEl.className        = 'card-num' + (isRolling ? ' rolling' : '');
      numEl.style.color      = '#e8e8e8';
      numEl.style.textShadow = 'none';
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Staggered slam-in reveal
// ─────────────────────────────────────────────────────────────────────────────
function revealSlots(nums, onDone) {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const numEl = document.getElementById(`card-num-${i}`);
      const card  = document.querySelector(`.num-card[data-idx="${i}"]`);

      numEl.textContent      = nums[i];
      numEl.className        = 'card-num';
      numEl.style.color      = '#e8e8e8';
      numEl.style.textShadow = 'none';

      card.classList.remove('slam');
      void card.offsetWidth;
      card.classList.add('slam');
      card.addEventListener('animationend', () => card.classList.remove('slam'), { once: true });

      sfxSlotTick(i);

      if (i === 5 && onDone) setTimeout(onDone, 180);
    }, i * 160);
  }
}

// Shiny card
// ─────────────────────────────────────────────────────────────────────────────
function applyShiny(idx) {
  document.querySelector(`.num-card[data-idx="${idx}"]`)?.classList.add('shiny');
}

function clearAllShiny() {
  for (let i = 0; i < 6; i++) {
    document.querySelector(`.num-card[data-idx="${i}"]`)?.classList.remove('shiny');
  }
}

function rollShinySlots() {
  shinySlots = Array.from({ length: 6 }, () => Math.random() < SHINY_CHANCE);
}

function revealShinySlots() {
  let anyShiny = false;
  shinySlots.forEach((isShiny, idx) => {
    if (!isShiny) return;
    anyShiny = true;
    applyShiny(idx);
  });
  if (anyShiny) sfxShiny();
}

// ─────────────────────────────────────────────────────────────────────────────
// Rule box
// ─────────────────────────────────────────────────────────────────────────────
function showRuleBox(result) {
  const box    = document.getElementById('rule-box');
  const title  = document.getElementById('rule-title');
  const textEl = document.getElementById('rule-text');

  // Reset
  box.className    = '';
  title.className  = '';
  textEl.className = '';
  textEl.style.color      = '';
  textEl.style.textShadow = '';
  void box.offsetWidth;

  if (result) {
    const tier = getRuleTierFixed(result.pct);
    const type = result.type || 'curse';

    // Mythical screen overlays fire first
    if (tier === 'mythical') {
      if (type === 'curse') triggerMythicalCurseOverlay();
      else                  triggerMythicalBuffOverlay();
    }

    box.className    = `show tier-${tier} type-${type}`;
    title.className  = `tier-${tier} type-${type}`;
    title.textContent = getTierLabel(tier, type);
    textEl.className  = `has-rule tier-${tier} type-${type}`;
    textEl.textContent = result.text;

    playRuleSfx(tier, type);
  } else {
    box.className      = 'show';
    title.textContent  = 'SPECIAL RULE';
    textEl.textContent = 'NO SPECIAL RULE THIS TIME.';
    textEl.style.color = '#333355';
  }
}

function hideRuleBox() {
  document.getElementById('rule-box').className = '';
}

// ─────────────────────────────────────────────────────────────────────────────
// Roll full team
// ─────────────────────────────────────────────────────────────────────────────
function roll() {
  if (rolling) return;
  initAudio();
  const max = getMax();
  document.getElementById('pool-input').value = max;
  rolling = true;
  hideRuleBox();
  clearAllShiny();
  // Reset charge bar
  const cb = document.getElementById('charge-bar');
  cb.style.transition = 'none'; cb.style.width = '0%'; cb.classList.remove('full');

  rollShinySlots();
  incrementTeamCount();

  const btn = document.getElementById('roll-btn');
  btn.textContent = 'ROLLING...';
  btn.classList.add('rolling');
  document.getElementById('pb-left').classList.add('spinning');
  document.getElementById('pb-right').classList.add('spinning');

  let n = 0;
  rollIv = setInterval(() => {
    renderCards(genTeam(max), true);
    sfxShuffleTick();
    if (++n >= 16) {
      clearInterval(rollIv);
      team = genTeam(max);

      for (let i = 0; i < 6; i++) {
        const numEl = document.getElementById(`card-num-${i}`);
        numEl.textContent = '—';
        numEl.className   = 'card-num empty';
      }

      rolling = false;
      btn.textContent = '▶  RANDOMIZE TEAM';
      btn.classList.remove('rolling');
      document.getElementById('pb-left').classList.remove('spinning');
      document.getElementById('pb-right').classList.remove('spinning');

      revealSlots(team, () => {
        const _snapshotTeam   = team.slice();
        const _snapshotShinys = shinySlots.slice();
        const _snapshotTeamN  = teamCount;
        setTimeout(() => {
          const ruleResult = rollRule();
          showRuleBox(ruleResult);
          addJournalEntry(_snapshotTeam, _snapshotShinys, ruleResult, _snapshotTeamN);
        }, 250);
        setTimeout(revealShinySlots, 700);
      });
    }
  }, 55);
}

// ─────────────────────────────────────────────────────────────────────────────
// Reroll single slot
// ─────────────────────────────────────────────────────────────────────────────
function rerollSlot(idx) {
  initAudio();
  const max    = getMax();
  const others = team.filter((_, i) => i !== idx).filter(v => v !== null);
  const card   = document.querySelector(`.num-card[data-idx="${idx}"]`);
  const numEl  = document.getElementById(`card-num-${idx}`);

  card.classList.add('rerolling');
  card.addEventListener('animationend', () => card.classList.remove('rerolling'), { once: true });

  let n = 0;
  const iv = setInterval(() => {
    numEl.textContent = randExcluding(max, others);
    numEl.className   = 'card-num rolling';
    sfxShuffleTick();
    if (++n >= 10) {
      clearInterval(iv);
      const newVal      = randExcluding(max, others);
      team[idx]         = newVal;
      shinySlots[idx]   = Math.random() < SHINY_CHANCE;
      numEl.textContent = newVal;
      numEl.className   = 'card-num';
      numEl.style.color = '#e8e8e8';
      sfxSlotTick(idx);
      if (shinySlots[idx]) {
        applyShiny(idx);
        sfxShiny();
      }
      // Update most recent journal entry for this slot
      if (journalEntries.length) {
        const latest = journalEntries[0];
        latest.slots[idx]  = newVal;
        latest.shinys[idx] = shinySlots[idx];
        latest.names[idx]  = '';  // clear any typed name since the mon changed
        saveJournal();
        if (journalOpen) renderJournalEntries();
      }
    }
  }, 55);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function renderRulesPanel() {
  const list = document.getElementById('rules-list');
  list.innerHTML = '';

  rules.forEach((rule, i) => {
    const item = document.createElement('div');
    item.className = 'rule-item';

    // Textarea
    const textIn = document.createElement('textarea');
    textIn.className   = 'rule-text-input';
    textIn.placeholder = 'Rule description...';
    textIn.value       = rule.text || '';
    textIn.rows        = 1;
    textIn.spellcheck  = false;

    const saveText = () => { rules[i].text = textIn.value; saveRules(); };
    textIn.addEventListener('input',  () => { autoResize(textIn); saveText(); });
    textIn.addEventListener('blur',   saveText);
    textIn.addEventListener('keydown', (e) => {
      if (e.key === 'Tab' && !e.shiftKey) {
        e.preventDefault();
        pctIn.focus(); pctIn.select();
      }
    });

    // Controls row
    const controls = document.createElement('div');
    controls.className = 'rule-controls';


    // % input
    const pctIn = document.createElement('input');
    pctIn.type      = 'text';
    pctIn.inputMode = 'decimal';
    pctIn.className = 'rule-pct-input';
    pctIn.value     = formatPct(rule.pct ?? 5);

    const savePct = () => {
      const v = parseFloat(pctIn.value.replace(',', '.'));
      rules[i].pct = isNaN(v) ? 0 : Math.max(0, Math.min(100, v));
      pctIn.value  = formatPct(rules[i].pct);
      saveRules();
      updateTotal();
    };
    pctIn.addEventListener('input', updateTotal);
    pctIn.addEventListener('blur',  savePct);
    pctIn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { savePct(); pctIn.blur(); }
      if (e.key === 'Tab' && !e.shiftKey) {
        savePct();
        const next = list.children[i + 1];
        if (next) { e.preventDefault(); next.querySelector('.rule-text-input').focus(); }
      }
      if (e.key === 'Tab' && e.shiftKey) { e.preventDefault(); textIn.focus(); }
    });

    const pctLbl = document.createElement('span');
    pctLbl.className   = 'pct-label';
    pctLbl.textContent = '%';

    // ── Tier pill ──
    const tierPill = document.createElement('span');
    tierPill.className = 'rule-tier-pill';
    function refreshTierPill(pct) {
      const tier = getRuleTierFixed(parseFloat(pct) || 0);
      tierPill.className   = 'rule-tier-pill tier-' + tier;
      tierPill.textContent = TIER_NAMES[tier];
    }
    refreshTierPill(rule.pct);
    pctIn.addEventListener('input',  () => refreshTierPill(pctIn.value.replace(',', '.')));
    pctIn.addEventListener('blur',   () => refreshTierPill(rules[i].pct));

    // ── Buff/Curse pill ──
    const pill = document.createElement('button');
    pill.className = 'rule-type-pill ' + (rule.type === 'buff' ? 'buff' : 'curse');
    pill.textContent = rule.type === 'buff' ? 'BUFF' : 'CURSE';
    pill.title = 'Toggle buff / curse';
    pill.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      rules[i].type = rules[i].type === 'buff' ? 'curse' : 'buff';
      saveRules();
      pill.className   = 'rule-type-pill ' + rules[i].type;
      pill.textContent = rules[i].type === 'buff' ? 'BUFF' : 'CURSE';
    });

    const del = document.createElement('button');
    del.className   = 'rule-del';
    del.textContent = '✕';
    del.title       = 'Remove rule';
    del.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      rules.splice(i, 1);
      saveRules();
      renderRulesPanel();
    });

    controls.appendChild(pctIn);
    controls.appendChild(pctLbl);
    controls.appendChild(tierPill);
    controls.appendChild(pill);
    controls.appendChild(del);

    item.appendChild(textIn);
    item.appendChild(controls);
    list.appendChild(item);

    requestAnimationFrame(() => autoResize(textIn));
  });

  updateTotal();
}

function updateTotal() {
  let total = 0;
  const inputs = document.querySelectorAll('.rule-pct-input');
  if (inputs.length) {
    inputs.forEach(inp => { total += parseFloat(inp.value.replace(',', '.')) || 0; });
  } else {
    total = rules.reduce((s, r) => s + (parseFloat(r.pct) || 0), 0);
  }
  const nothing = Math.max(0, 100 - total);
  document.getElementById('total-pct').textContent   = formatPct(total);
  document.getElementById('nothing-pct').textContent = formatPct(nothing);
}

const TIER_ORDER = ['mythical','legendary','ultra','rare','uncommon','common','frequent','guaranteed'];

// sortRarityDir: 'rarest' = mythical first, 'common' = guaranteed first
let sortRarityDir = 'rarest';
const sortRarityBtn = document.getElementById('sort-rarity-btn');

function applyRaritySort() {
  // Sort by raw % — 1% (rarest) to 100% (most common)
  rules.sort((a, b) => sortRarityDir === 'rarest' ? a.pct - b.pct : b.pct - a.pct);
  sortRarityDir = sortRarityDir === 'rarest' ? 'common' : 'rarest';
  sortRarityBtn.textContent = sortRarityDir === 'rarest' ? '↓ RAREST' : '↓ COMMON';
  saveRules(); renderRulesPanel();
}

// sortTypeDir: 'curse' = curses first, 'buff' = buffs first
let sortTypeDir = 'curse';
const sortTypeBtn = document.getElementById('sort-type-btn');

function applyTypeSort() {
  // Sort by type, then rarest-first within each group
  rules.sort((a, b) => {
    const ta = a.type === 'buff' ? 1 : 0;
    const tb = b.type === 'buff' ? 1 : 0;
    const typeDiff = sortTypeDir === 'curse' ? ta - tb : tb - ta;
    return typeDiff !== 0 ? typeDiff : a.pct - b.pct;
  });
  sortTypeDir = sortTypeDir === 'curse' ? 'buff' : 'curse';
  sortTypeBtn.textContent = sortTypeDir === 'curse' ? '↓ CURSES' : '↓ BUFFS';
  saveRules(); renderRulesPanel();
}

document.getElementById('import-file').addEventListener('change', function() {

  reader.readAsText(file);
  this.value = '';
});

function parseCSV(text) {
  const lines  = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return [];
  // skip header if present
  const start  = lines[0].trim().toLowerCase().startsWith('text') ? 1 : 0;
  const result = [];
  for (let i = start; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (!cols.length) continue;
    const text = cols[0] ?? '';
    const pct  = Math.max(0, Math.min(100, parseFloat(cols[1]) || 0));
    const type = cols[2]?.trim().toLowerCase() === 'buff' ? 'buff' : 'curse';
    result.push({ text, pct, type });
  }
  return result;
}

function splitCSVLine(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      cols.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  cols.push(cur);
  return cols;
}

// Hold-to-roll charge ritual (2 seconds)
// ─────────────────────────────────────────────────────────────────────────────
const CHARGE_MS = 2000;
const rollBtn   = document.getElementById('roll-btn');
const chargeBar = document.getElementById('charge-bar');

let chargeTimer   = null;
let chargeStart   = null;
let chargeRafId   = null;

function sfxChargeTick(progress) {
  // Rising pitch beep as charge builds
  const freq = 200 + progress * 900;
  const vol  = 0.04 + progress * 0.06;
  playNote(freq, 0, 0.06, vol, 'square');
}

function sfxChargeAbort() {
  playNote(200, 0, 0.15, 0.07, 'sawtooth', 350);
}

function startCharge() {
  if (rolling) return;
  initAudio();
  chargeStart = performance.now();
  rollBtn.classList.add('charging');
  chargeBar.style.transition = 'none';
  chargeBar.style.width = '0%';
  chargeBar.classList.remove('full');

  let lastBeep = 0;
  function frame(now) {
    const elapsed  = now - chargeStart;
    const progress = Math.min(elapsed / CHARGE_MS, 1);
    chargeBar.style.width = (progress * 100) + '%';

    // Tick SFX every ~200ms, accelerating
    const beepInterval = 200 - progress * 140;
    if (now - lastBeep > beepInterval) {
      sfxChargeTick(progress);
      lastBeep = now;
    }

    // Label stages
    if (progress < 0.4)      rollBtn.textContent = '▶  HOLD TO ROLL...';
    else if (progress < 0.8) rollBtn.textContent = '▶▶ CHARGING...';
    else                      rollBtn.textContent = '▶▶▶ ALMOST!';

    if (progress < 1) {
      chargeRafId = requestAnimationFrame(frame);
    } else {
      // Fully charged — fire!
      chargeBar.classList.add('full');
      chargeBar.style.width = '100%';
      rollBtn.textContent   = '▶  RANDOMIZE TEAM';
      rollBtn.classList.remove('charging');
      chargeStart = null;
      roll();
    }
  }
  chargeRafId = requestAnimationFrame(frame);
}

function cancelCharge() {
  if (!chargeStart) return;
  cancelAnimationFrame(chargeRafId);
  chargeStart = null;
  sfxChargeAbort();
  rollBtn.classList.remove('charging');
  rollBtn.textContent = '▶  RANDOMIZE TEAM';
  // Drain the bar
  chargeBar.style.transition = 'width .35s ease';
  chargeBar.style.width = '0%';
  chargeBar.classList.remove('full');
}

rollBtn.addEventListener('pointerdown', (e) => {
  if (e.button !== undefined && e.button !== 0) return;
  if (rolling) return;
  e.preventDefault();
  rollBtn.setPointerCapture(e.pointerId);
  startCharge();
});
rollBtn.addEventListener('pointerup',    cancelCharge);
rollBtn.addEventListener('pointerleave', cancelCharge);

function makeChip(entry, slotIdx) {
  const chip = document.createElement('div');
  chip.className = 'jentry-chip' + (entry.shinys[slotIdx] ? ' shiny-chip' : '');

  const slotColor = COLORS[slotIdx] || '#e0e0e0';

  const numEl = document.createElement('span');
  numEl.className = 'jentry-chip-num';
  if (!entry.shinys[slotIdx]) numEl.style.color = slotColor;

  const nameEl = document.createElement('span');
  nameEl.className = 'jentry-chip-name';
  if (!entry.shinys[slotIdx]) nameEl.style.color = slotColor;

  const inp = document.createElement('input');
  inp.className = 'jentry-chip-input';
  inp.type = 'text';
  inp.maxLength = 18;
  inp.placeholder = String(entry.slots[slotIdx]);
  inp.spellcheck = false;

  function refresh() {
    const n = entry.names[slotIdx];
    if (n) {
      numEl.style.display = 'none';
      nameEl.style.display = '';
      nameEl.textContent = n;
    } else {
      numEl.style.display = '';
      nameEl.style.display = 'none';
      numEl.textContent = String(entry.slots[slotIdx]);
    }
  }
  refresh();

  chip.appendChild(numEl);
  chip.appendChild(nameEl);
  chip.appendChild(inp);

  chip.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    chip.classList.add('editing');
    inp.value = entry.names[slotIdx] || '';
    requestAnimationFrame(() => { inp.focus(); inp.select(); });
  });

  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === 'Escape') { inp.blur(); }
  });

  inp.addEventListener('blur', () => {
    entry.names[slotIdx] = inp.value.trim();
    chip.classList.remove('editing');
    refresh();
    saveJournal();
  });

  return chip;
}

    e.preventDefault(); e.stopPropagation();
    if      (!entry.battleWinner)          entry.battleWinner = 'p1';
    else if (entry.battleWinner === 'p1')  entry.battleWinner = 'p2';
    else                                   entry.battleWinner = '';
    battlePill.className = 'jentry-battle-pill' + (entry.battleWinner === 'p1' ? ' won-p1' : entry.battleWinner === 'p2' ? ' won-p2' : '');
    refreshBattlePill();
    saveJournal();
  });
  el.appendChild(battlePill);

  // Rule box
  const ruleBox = document.createElement('div');
  ruleBox.className = 'jentry-rule';

  if (entry.rule) {
    const key = `${entry.rule.tier}-${entry.rule.type}`;
    const c = TIER_RULE_COLORS[key] || {};
    if (c.bg)     { ruleBox.style.background   = c.bg; }
    if (c.border) { ruleBox.style.borderColor  = c.border; }

    const ruleLabel = document.createElement('div');
    ruleLabel.className = 'jentry-rule-label';
    ruleLabel.style.color = c.label || '#a78bfa';
    ruleLabel.textContent = getTierLabel(entry.rule.tier, entry.rule.type);

    const ruleText = document.createElement('div');
    ruleText.className = 'jentry-rule-text has-rule';
    ruleText.style.color = c.text || '#e0e0e0';
    ruleText.textContent = entry.rule.text;

    ruleBox.appendChild(ruleLabel);
    ruleBox.appendChild(ruleText);
  } else {
    const ruleText = document.createElement('div');
    ruleText.className = 'jentry-rule-text no-rule';
    ruleText.textContent = '— no rule —';
    ruleBox.appendChild(ruleText);
  }
  el.appendChild(ruleBox);

  // Notes
  const notes = document.createElement('textarea');
  notes.className = 'jentry-notes';
  notes.placeholder = 'what happened...';
  notes.value = entry.notes || '';
  notes.rows = 1;
  notes.spellcheck = false;
  notes.addEventListener('pointerdown', e => e.stopPropagation());
  notes.addEventListener('input', () => {
    notes.style.height = 'auto';
    notes.style.height = notes.scrollHeight + 'px';
    entry.notes = notes.value;
    saveJournal();
  });
  requestAnimationFrame(() => {
    notes.style.height = 'auto';
    notes.style.height = notes.scrollHeight + 'px';
  });
  el.appendChild(notes);

  return el;
}

function renderJournalEntries() {
  const container = document.getElementById('journal-entries');
  const empty     = document.getElementById('journal-empty');
  container.innerHTML = '';
  container.appendChild(empty);

  if (!journalEntries.length) {
    empty.style.display = '';
    document.getElementById('journal-summary').textContent = '';
    return;
  }
  empty.style.display = 'none';
  document.getElementById('journal-summary').textContent = journalSummaryText();

  for (const entry of journalEntries) {
    container.appendChild(renderJournalEntry(entry));
  }
}

// ── Journal panel open/close ──
const journalBtn   = document.getElementById('journal-btn');
const journalPanel = document.getElementById('journal-panel');
let journalOpen = false;

journalPanel.addEventListener('pointerdown', e => e.stopPropagation());

journalBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  e.stopPropagation();
  journalOpen = !journalOpen;
  journalBtn.classList.toggle('open', journalOpen);
  if (journalOpen) {
    // close rules panel if open
    if (panelOpen) {
      panelOpen = false;
      cogBtn.classList.remove('open');
      rulesPanel.classList.remove('open');
    }
    journalPanel.classList.add('open');
    renderJournalEntries();
  } else {
    journalPanel.classList.remove('open');
  }
});

document.addEventListener('pointerdown', () => {
  if (!journalOpen) return;
  journalOpen = false;
  journalBtn.classList.remove('open');
  journalPanel.classList.remove('open');
});

// ─────────────────────────────────────────────────────────────────────────────
// Run number
// ─────────────────────────────────────────────────────────────────────────────
let currentRun = parseInt(loadData('soullink_current_run') || '1', 10) || 1;
const runNumberInput = document.getElementById('run-number-input');
runNumberInput.value = currentRun;

runNumberInput.addEventListener('change', () => {
  const v = parseInt(runNumberInput.value, 10);
  currentRun = isNaN(v) ? 1 : Math.max(1, Math.min(99, v));
  runNumberInput.value = currentRun;
  saveData('soullink_current_run', currentRun);
  // Load data for this run from gist cache (or local)
  const cached = loadData('soullink_gist_cache');
  if (cached) {
    applyRunData(cached, currentRun);
  } else {
    journalEntries = [];
    updateJournalBadge();
    if (journalOpen) renderJournalEntries();
  }
  // Also sync team count from local for this run key (if no gist)
  const storedCount = loadData(`soullink_team_count_run${currentRun}`);
  if (storedCount !== null) {
    teamCount = parseInt(storedCount, 10) || 0;
    teamCountInput.value = teamCount;
  }
  // Pull fresh from gist for this run
  pullFromGist();
});

// ─────────────────────────────────────────────────────────────────────────────
// Token modal
// ─────────────────────────────────────────────────────────────────────────────
const tokenBackdrop   = document.getElementById('token-modal-backdrop');
const tokenInput      = document.getElementById('token-input');
const tokenRemember   = document.getElementById('token-remember');
const tokenConfirmBtn = document.getElementById('token-confirm-btn');
const tokenSkipBtn    = document.getElementById('token-skip-btn');

function closeTokenModal() {
  tokenBackdrop.classList.add('hidden');
}

tokenConfirmBtn.addEventListener('pointerdown', async (e) => {
  e.preventDefault();
  const tok = tokenInput.value.trim();
  if (!tok) { tokenInput.focus(); return; }
  setToken(tok, tokenRemember.checked);
  closeTokenModal();
  await pullFromGist();
});

tokenSkipBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  closeTokenModal();
});

// Pre-fill if remembered
const existingToken = getToken();
if (existingToken) {
  tokenInput.value = existingToken;
  tokenRemember.checked = !!localStorage.getItem('soullink_gh_token');
  closeTokenModal();
} else {
  // Show modal — prevent backdrop close via document pointerdown
  tokenBackdrop.addEventListener('pointerdown', (e) => {
    if (e.target === tokenBackdrop) { /* don't close on backdrop click — token is important */ }
  });
}

// Stop modal content clicks from propagating to document close listeners
document.getElementById('token-modal').addEventListener('pointerdown', e => e.stopPropagation());
tokenBackdrop.addEventListener('pointerdown', e => e.stopPropagation());

// ── Init journal ──
journalEntries = loadJournal();
updateJournalBadge();

// Pull from gist on load if token exists
if (existingToken) {
  pullFromGist();
}
</script>
</body>
</html>
